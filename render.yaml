services:
  # Backend Service
  - type: web
    name: warehouse-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn warehouse_config.wsgi:application --chdir warehouse_config
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # You will enter your Supabase URL in the Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

  # Frontend Service (Static Site)
  - type: web
    name: warehouse-frontend
    env: static
    buildCommand: cd warehouse_config/frontend && npm install && npm run build
    staticPublishPath: warehouse_config/frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: warehouse-backend
          type: web
          property: url
